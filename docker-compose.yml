version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: repair_system_mysql
    environment:
      MYSQL_ROOT_PASSWORD: repair_root_123
      MYSQL_DATABASE: repair_system
      MYSQL_USER: repair_user
      MYSQL_PASSWORD: repair_pass_123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
    networks:
      - repair_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: repair_system_backend
    ports:
      - "8080:8080"
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: repair_user
      DB_PASSWORD: repair_pass_123
      DB_NAME: repair_system
      JWT_SECRET: repair_system_jwt_secret_key_2024
      UPLOAD_DIR: /app/uploads
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - repair_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: repair_system_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - repair_network

volumes:
  mysql_data:
  uploads_data:

networks:
  repair_network:
    driver: bridge
